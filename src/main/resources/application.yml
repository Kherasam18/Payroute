# ============================================================
# PayRoute — Base Configuration (shared across all profiles)
# ============================================================

spring:
  application:
    name: payroute

  # --- PostgreSQL DataSource ---
  datasource:
    url: jdbc:postgresql://localhost:5432/payroute_db
    username: postgres
    password: samkhera
    driver-class-name: org.postgresql.Driver

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration

  # --- Kafka ---
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payroute-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # --- Redis ---
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

# ============================================================
# PayRoute Custom Properties
# ============================================================
payroute:
  idempotency:
    ttl-hours: 24
  retry:
    max-attempts: 3
    delay-ms: 500
  routing:
    default-strategy: PRIORITY

# ============================================================
# Actuator & Observability
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    export:
      prometheus

# ============================================================
# Server
# ============================================================
server:
  port: 8080

# ============================================================
# Logging
# ============================================================
logging:
  level:
    com.payroute.orchestrate: DEBUG
